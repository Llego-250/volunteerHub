<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backend Connection Test</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
        button:hover { background: #0056b3; }
        .result { margin-top: 10px; padding: 10px; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        pre { background: #f4f4f4; padding: 10px; border-radius: 4px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Backend-Frontend Connection Test</h1>
    
    <div class="test-section">
        <h3>Test 0: CORS Test (Simple)</h3>
        <button onclick="testCORS()">Test CORS</button>
        <div id="corsResult"></div>
    </div>
    
    <div class="test-section">
        <h3>Test 1: Get Users (GET Request)</h3>
        <button onclick="testGetUsers()">Test GET Users</button>
        <div id="getUsersResult"></div>
    </div>

    <div class="test-section">
        <h3>Test 2: Register User (POST Request)</h3>
        <button onclick="testRegister()">Test Register</button>
        <div id="registerResult"></div>
    </div>

    <div class="test-section">
        <h3>Test 3: Login User (POST Request)</h3>
        <button onclick="testLogin()">Test Login</button>
        <div id="loginResult"></div>
    </div>

    <div class="test-section">
        <h3>Test 4: Get Events (GET Request)</h3>
        <button onclick="testGetEvents()">Test GET Events</button>
        <div id="getEventsResult"></div>
    </div>

    <script>
        const API_URL = 'api';

        async function testCORS() {
            const resultDiv = document.getElementById('corsResult');
            resultDiv.innerHTML = '<p>Testing...</p>';
            
            try {
                const response = await fetch(`${API_URL}/test-cors.php`);
                const data = await response.json();
                resultDiv.innerHTML = `
                    <div class="result success">
                        <strong>✓ CORS Working!</strong>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    </div>
                `;
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="result error">
                        <strong>✗ CORS Failed:</strong> ${error.message}
                    </div>
                `;
            }
        }

        async function testGetUsers() {
            const resultDiv = document.getElementById('getUsersResult');
            resultDiv.innerHTML = '<p>Testing...</p>';
            
            try {
                const response = await fetch(`${API_URL}/users.php`);
                const data = await response.json();
                resultDiv.innerHTML = `
                    <div class="result success">
                        <strong>✓ Success!</strong>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    </div>
                `;
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="result error">
                        <strong>✗ Error:</strong> ${error.message}
                    </div>
                `;
            }
        }

        async function testRegister() {
            const resultDiv = document.getElementById('registerResult');
            resultDiv.innerHTML = '<p>Testing...</p>';
            
            const testUser = {
                name: 'Test User',
                email: `test${Date.now()}@example.com`,
                password: 'test123',
                role: 'volunteer',
                phone: '1234567890',
                location: 'Test City',
                interests: ['Environment', 'Education']
            };

            try {
                const response = await fetch(`${API_URL}/users.php?action=register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(testUser)
                });
                const data = await response.json();
                resultDiv.innerHTML = `
                    <div class="result ${data.success ? 'success' : 'error'}">
                        <strong>${data.success ? '✓ Success!' : '✗ Failed'}</strong>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    </div>
                `;
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="result error">
                        <strong>✗ Error:</strong> ${error.message}
                    </div>
                `;
            }
        }

        async function testLogin() {
            const resultDiv = document.getElementById('loginResult');
            resultDiv.innerHTML = '<p>Testing...</p>';
            
            const credentials = {
                email: 'test@example.com',
                password: 'test123',
                role: 'volunteer'
            };

            try {
                const response = await fetch(`${API_URL}/users.php?action=login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(credentials)
                });
                const data = await response.json();
                resultDiv.innerHTML = `
                    <div class="result ${data.success ? 'success' : 'error'}">
                        <strong>${data.success ? '✓ Success!' : '✗ Failed'}</strong>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    </div>
                `;
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="result error">
                        <strong>✗ Error:</strong> ${error.message}
                    </div>
                `;
            }
        }

        async function testGetEvents() {
            const resultDiv = document.getElementById('getEventsResult');
            resultDiv.innerHTML = '<p>Testing...</p>';
            
            try {
                const response = await fetch(`${API_URL}/events.php`);
                const data = await response.json();
                resultDiv.innerHTML = `
                    <div class="result success">
                        <strong>✓ Success!</strong>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    </div>
                `;
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="result error">
                        <strong>✗ Error:</strong> ${error.message}
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
